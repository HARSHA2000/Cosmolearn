# Nginx configuration for train.cosmoverge.in → Next.js container on port 3000
# Place this in /etc/nginx/sites-available/train.cosmoverge.in
# Then: ln -s /etc/nginx/sites-available/train.cosmoverge.in /etc/nginx/sites-enabled/
# Manage SSL via Certbot: certbot --nginx -d train.cosmoverge.in

server {
    listen 80;
    server_name train.cosmoverge.in;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name train.cosmoverge.in;

    # --- SSL (managed by Certbot) ---
    ssl_certificate /etc/letsencrypt/live/train.cosmoverge.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/train.cosmoverge.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # --- Proxy to Next.js container ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # --- Static asset caching (Next.js _next/static) ---
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- Public folder ---
    location /public/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # --- Access and error logs ---
    access_log /var/log/nginx/train.cosmoverge.in.access.log;
    error_log /var/log/nginx/train.cosmoverge.in.error.log;
}
